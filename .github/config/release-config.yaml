# Central configuration for all release-related settings

# Package managers to update
package_managers:
  homebrew:
    enabled: true
    tap_repo: "otto-nation/homebrew-tap"
    formulas:
      otto-workbench:
        formula_path: "Formula/otto-workbench.rb"
      claude-review:
        formula_path: "Formula/claude-review.rb"

# Notification settings (currently disabled)
notifications:
  enabled: false
