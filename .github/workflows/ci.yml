name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        # Auto-discover scripts by shebang so new files are checked automatically
        run: |
          grep -rlE '^#!.*(/(ba)?sh|/env (ba)?sh)' . \
            | grep -v '^\./\.git/' \
            | sort \
            | xargs shellcheck --severity=warning

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: YAML lint
        run: yamllint .

      - name: Install zsh
        run: sudo apt-get install -y zsh

      - name: ZSH syntax check
        run: find . -name '*.zsh' -not -path './.git/*' -exec zsh -n {} +

      - name: JSON validation
        run: |
          find . -name '*.json' -not -path './.git/*' -not -path './.claude/*' \
            -exec sh -c 'for f; do jq -e "." "$f" > /dev/null || { echo "Invalid: $f"; exit 1; }; done' _ {} +

  tools-freshness:
    name: Tool Context Freshness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.3"
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Validate registries
        run: bash bin/validate-registries

      - name: Validate component framework
        run: bash bin/validate-components

      - name: Validate migrations
        run: bash bin/validate-migrations

      - name: Verify generated files are up to date
        run: |
          bash bin/generate-tool-context
          failed=false
          for f in ai/guidelines/rules/tools.generated.md ai/guidelines/rules/tools-workflow.generated.md docs/tools.md docs/ai-automation.md docs/components.md README.md; do
            if ! git diff --exit-code "$f"; then
              echo ""
              echo "$f is out of date."
              failed=true
            fi
          done
          if $failed; then
            echo "Run bin/generate-tool-context locally and commit the result."
            exit 1
          fi

      - name: Verify git.generated.md is up to date
        run: |
          bash git/bin/generate-git-rules
          if ! git diff --exit-code ai/guidelines/rules/git.generated.md; then
            echo ""
            echo "git.generated.md is out of date."
            echo "Run git/bin/generate-git-rules locally and commit the result."
            exit 1
          fi

  test:
    name: Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.3"
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Install task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Taskfile parses
        run: task --list

      - name: Run tests
        run: bats tests/ --recursive --timing
