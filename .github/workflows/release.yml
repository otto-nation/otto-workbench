name: Release

# ---------------------------------------------------------------------------
# Triggers
# ---------------------------------------------------------------------------
# Push to main runs release-please, which opens/updates the release PR.
# When that PR is merged, release-please creates tags and the package jobs
# build tarballs and deploy Homebrew formulas.
#
# Manual overrides:
#   deploy_homebrew_tag — re-deploy a formula for an existing release tag.
#   deploy_homebrew_app — which formula to deploy (otto-workbench or claude-review).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_homebrew_tag:
        description: "Re-deploy Homebrew formula for an existing tag (e.g. v1.5.0 or claude-review-v1.0.1)"
        required: false
        default: ""
        type: string
      deploy_homebrew_app:
        description: "Which formula to deploy"
        required: false
        default: "otto-workbench"
        type: choice
        options:
          - otto-workbench
          - claude-review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Create or update the release PR; publish GitHub releases when merged.
  # Handles both otto-workbench (root) and claude-review (ai/claude) packages.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      # Root package (otto-workbench)
      wb_release_created: ${{ steps.release.outputs.release_created }}
      wb_tag_name: ${{ steps.release.outputs.tag_name }}
      wb_version: ${{ steps.release.outputs.version }}
      # claude-review package
      cr_release_created: ${{ steps.release.outputs['ai/claude--release_created'] }}
      cr_tag_name: ${{ steps.release.outputs['ai/claude--tag_name'] }}
      cr_version: ${{ steps.release.outputs['ai/claude--version'] }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/.release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Release summary
        if: steps.release.outputs.releases_created
        run: |
          echo "Releases created:"
          if [ "${{ steps.release.outputs.release_created }}" = "true" ]; then
            echo "  otto-workbench: ${{ steps.release.outputs.tag_name }}"
          fi
          if [ "${{ steps.release.outputs['ai/claude--release_created'] }}" = "true" ]; then
            echo "  claude-review: ${{ steps.release.outputs['ai/claude--tag_name'] }}"
          fi

  # ---------------------------------------------------------------------------
  # Package otto-workbench: tarball + Homebrew formula
  # ---------------------------------------------------------------------------
  package-workbench:
    name: Package otto-workbench
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.wb_release_created == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load release configuration
        id: release-config
        run: |
          HOMEBREW_ENABLED=$(yq eval '.package_managers.homebrew.enabled' .github/config/release-config.yaml)
          echo "homebrew-enabled=$HOMEBREW_ENABLED" >> $GITHUB_OUTPUT

      - name: Create distributable tarball
        run: |
          VERSION="${{ needs.release.outputs.wb_version }}"
          TARBALL="otto-workbench-${VERSION}.tar.gz"
          tar czf "/tmp/$TARBALL" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='.shellcheckrc' \
            .
          mv "/tmp/$TARBALL" .
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV

      - name: Generate checksums
        run: |
          sha256sum "${{ env.TARBALL }}" > checksums.txt
          cat checksums.txt
          TARBALL_SHA256=$(sha256sum "${{ env.TARBALL }}" | cut -d' ' -f1)
          echo "TARBALL_SHA256=$TARBALL_SHA256" >> $GITHUB_ENV

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release.outputs.wb_tag_name }}" \
            "${{ env.TARBALL }}" \
            checksums.txt \
            --clobber

      - name: Deploy Homebrew formula
        if: steps.release-config.outputs.homebrew-enabled == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.wb_tag_name }}"
          ./scripts/homebrew.sh update -v "$TAG" -s "${{ env.TARBALL_SHA256 }}" --app otto-workbench
          ./scripts/homebrew.sh deploy -v "$TAG" --app otto-workbench

      - name: Verify Homebrew tap deployment
        if: steps.release-config.outputs.homebrew-enabled == 'true'
        run: |
          EXPECTED_VERSION="${{ needs.release.outputs.wb_version }}"
          TAP_FORMULA_URL="https://raw.githubusercontent.com/otto-nation/homebrew-tap/main/Formula/otto-workbench.rb"
          sleep 5
          TAP_CONTENT=$(curl -fsSL "$TAP_FORMULA_URL")
          if ! echo "$TAP_CONTENT" | grep -qF "version \"$EXPECTED_VERSION\""; then
            echo "Tap formula does not contain expected version '$EXPECTED_VERSION'"
            echo "$TAP_CONTENT" | head -20
            exit 1
          fi
          echo "Tap formula verified at version $EXPECTED_VERSION"

  # ---------------------------------------------------------------------------
  # Package claude-review: tarball + Homebrew formula
  # ---------------------------------------------------------------------------
  package-claude-review:
    name: Package claude-review
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.cr_release_created == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load release configuration
        id: release-config
        run: |
          HOMEBREW_ENABLED=$(yq eval '.package_managers.homebrew.enabled' .github/config/release-config.yaml)
          echo "homebrew-enabled=$HOMEBREW_ENABLED" >> $GITHUB_OUTPUT

      - name: Build claude-review tarball
        run: |
          VERSION="${{ needs.release.outputs.cr_version }}"
          ./ai/claude/bin/build-claude-review-tarball "$VERSION"
          TARBALL="claude-review-${VERSION}.tar.gz"
          TARBALL_SHA256=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV
          echo "TARBALL_SHA256=$TARBALL_SHA256" >> $GITHUB_ENV

      - name: Generate checksums
        run: |
          sha256sum "${{ env.TARBALL }}" > checksums.txt
          cat checksums.txt

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release.outputs.cr_tag_name }}" \
            "${{ env.TARBALL }}" \
            checksums.txt \
            --clobber

      - name: Deploy Homebrew formula
        if: steps.release-config.outputs.homebrew-enabled == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release.outputs.cr_tag_name }}"
          ./scripts/homebrew.sh update -v "$TAG" -s "${{ env.TARBALL_SHA256 }}" --app claude-review
          ./scripts/homebrew.sh deploy -v "$TAG" --app claude-review

      - name: Verify Homebrew tap deployment
        if: steps.release-config.outputs.homebrew-enabled == 'true'
        run: |
          EXPECTED_VERSION="${{ needs.release.outputs.cr_version }}"
          TAP_FORMULA_URL="https://raw.githubusercontent.com/otto-nation/homebrew-tap/main/Formula/claude-review.rb"
          sleep 5
          TAP_CONTENT=$(curl -fsSL "$TAP_FORMULA_URL")
          if ! echo "$TAP_CONTENT" | grep -qF "version \"$EXPECTED_VERSION\""; then
            echo "Tap formula does not contain expected version '$EXPECTED_VERSION'"
            echo "$TAP_CONTENT" | head -20
            exit 1
          fi
          echo "Tap formula verified at version $EXPECTED_VERSION"

  # ---------------------------------------------------------------------------
  # Post-release summary
  # ---------------------------------------------------------------------------
  post-release:
    name: Post-Release
    runs-on: ubuntu-latest
    needs: [release, package-workbench, package-claude-review]
    if: always() && (needs.release.outputs.wb_release_created == 'true' || needs.release.outputs.cr_release_created == 'true')
    steps:
      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.release.outputs.wb_release_created }}" = "true" ]; then
            echo "### otto-workbench" >> $GITHUB_STEP_SUMMARY
            echo "- **Version:** ${{ needs.release.outputs.wb_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Tag:** ${{ needs.release.outputs.wb_tag_name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Package:** ${{ needs.package-workbench.result }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.release.outputs.cr_release_created }}" = "true" ]; then
            echo "### claude-review" >> $GITHUB_STEP_SUMMARY
            echo "- **Version:** ${{ needs.release.outputs.cr_version }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Tag:** ${{ needs.release.outputs.cr_tag_name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Package:** ${{ needs.package-claude-review.result }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Manual: re-deploy a Homebrew formula for an existing tag.
  # ---------------------------------------------------------------------------
  deploy-homebrew:
    name: Deploy Homebrew Formula
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_homebrew_tag != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.deploy_homebrew_tag }}"
          APP="${{ inputs.deploy_homebrew_app }}"
          echo "Deploying ${APP} formula for $TAG..."
          ./scripts/homebrew.sh update -v "$TAG" --app "$APP"
          ./scripts/homebrew.sh deploy -v "$TAG" --app "$APP"

      - name: Verify deployment
        run: |
          TAG="${{ inputs.deploy_homebrew_tag }}"
          APP="${{ inputs.deploy_homebrew_app }}"
          VERSION="${TAG##*v}"
          TAP_FORMULA_URL="https://raw.githubusercontent.com/otto-nation/homebrew-tap/main/Formula/${APP}.rb"
          sleep 5
          TAP_CONTENT=$(curl -fsSL "$TAP_FORMULA_URL")
          if ! echo "$TAP_CONTENT" | grep -qF "version \"$VERSION\""; then
            echo "Tap formula does not contain expected version '$VERSION'"
            echo "$TAP_CONTENT" | head -20
            exit 1
          fi
          echo "Tap formula verified at version $VERSION"

  # ---------------------------------------------------------------------------
  # Failure notification
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [release, package-workbench, package-claude-review, post-release]
    if: failure() && (needs.release.outputs.wb_release_created == 'true' || needs.release.outputs.cr_release_created == 'true')
    steps:
      - name: Failure summary
        run: |
          echo "Release pipeline failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package workbench | ${{ needs.package-workbench.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package claude-review | ${{ needs.package-claude-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-Release | ${{ needs.post-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
