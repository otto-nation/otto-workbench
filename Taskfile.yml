# Workbench repo — local development tasks
# These tasks are only relevant when contributing to this repo.
#
# Global AI/git automation tasks live in Taskfile.global.yml and are
# installed to ~/.config/task/Taskfile.global.yml by install.sh.
# Run them from anywhere with: task --global commit, task --global pr:create, etc.

version: "3"

includes:
  global:
    taskfile: ./Taskfile.global.yml

tasks:
  test:
    desc: "Run bats test suite"
    silent: true
    cmds:
      - bats tests/ --recursive --timing
  test:*:
    desc: "Run a single test suite by filename"
    vars:
      FILENAME: '{{index .MATCH 0}}.bats'
    silent: true
    preconditions:
      - sh: 'test -f tests/{{.FILENAME}}'
        msg: "File not found: tests/{{.FILENAME}}"
    cmds:
      - bats tests/{{.FILENAME}} --recursive --timing --show-output-of-passing-tests

  lint:
    desc: "Run ShellCheck on all shell scripts"
    silent: true
    cmds:
      - |
        grep -rlE '^#!.*(/(ba)?sh|/env (ba)?sh)' . \
          | grep -v '^\./\.git/' \
          | sort \
          | xargs shellcheck --severity=warning
        echo "✓ ShellCheck passed"

  dev:setup:
    desc: "Activate git hooks for workbench development (run once after cloning)"
    silent: true
    cmds:
      - git config core.hooksPath git/hooks
      - echo "✓ Git hooks activated (git/hooks/pre-push runs lint + test before every push)"
