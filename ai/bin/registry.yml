# AI script registry — installed when the AI component is set up.
# Regenerate: ai/bin/generate-tool-context

meta:
  section: "AI Scripts"
  loading: always
  install_check: false
  validation: bindir
  source: ai/bin

tools:
  - name: claude-review
    description: "Run Claude's reviewer agent on a PR and optionally post findings to GitHub"
    when_to_use: "Running a structured code review on a PR with optional GitHub posting"
    usage: "claude-review <pr_url_or_number>  |  claude-review post <pr_number>"

  - name: claude-rules
    description: "Manages local Claude Code rule additions not tracked in the workbench"
    when_to_use: "Adding machine-specific or project-specific Claude instructions"
    usage: "claude-rules add <domain> \"rule\"  |  claude-rules list  |  claude-rules status"

  - name: generate-tool-context
    description: "Generates ai/guidelines/rules/tools.generated.md from the domain registries"
    when_to_use: "After adding/updating any registry.yml entry; runs automatically on pre-push and workbench sync"
    usage: "ai/bin/generate-tool-context"

  - name: serena-mcp
    description: "Scaffolds Serena MCP into a project's .mcp.json for project-scoped code intelligence"
    when_to_use: "Enabling Serena LSP-based code intelligence in a specific project"
    usage: "serena-mcp init  |  serena-mcp status"
