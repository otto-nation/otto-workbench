# Claude script registry — installed when the Claude sub-tool is set up.
# Regenerate: generate-tool-context

meta:
  section: "Claude Scripts"
  install_check: false
  validation: bindir
  source: ai/claude/bin

tools:
  - name: claude-review
    allow: true
    description: "Run Claude's reviewer agent on a PR with local worktree checkout and iterative review support"
    when_to_use: "Running a structured code review on a PR; supports re-reviews that track resolved vs open findings. Use --self for self-review before PR creation. For multiple PRs, dispatch separate Agent subagents — do not background with &"
    usage: "claude-review <pr_url_or_number>  |  claude-review --no-post <pr_url_or_number>  |  claude-review --self [<pr_url_or_number>]  |  claude-review --self --repo /path/to/worktree"

  - name: claude-rules
    allow: true
    description: "Manages local Claude Code rule additions not tracked in the workbench"
    when_to_use: "Adding machine-specific or project-specific Claude instructions"
    usage: "claude-rules add <domain> \"rule\"  |  claude-rules list  |  claude-rules status"

  - name: review-orchestrate
    context: none
    description: "Review orchestration engine for claude-review — manages tier classification, file grouping, and review merging"
    when_to_use: "Called internally by claude-review; not invoked directly"

  - name: review-post
    context: none
    description: "Deterministic posting of review findings to GitHub as a PENDING PR review"
    when_to_use: "Called internally by claude-review post; not invoked directly"

  - name: validate-review-positions
    context: none
    description: "Validates review finding positions against a PR diff to ensure comment placement accuracy"
    when_to_use: "Called internally by claude-review; not invoked directly"

  - name: build-claude-review-tarball
    context: none
    description: "Package claude-review into a self-contained tarball for Homebrew distribution"
    when_to_use: "Called by release workflow to build the claude-review distributable; not invoked directly"

  - name: dream-scan
    allow: true
    description: "Scan session transcripts and memory state for dream consolidation"
    when_to_use: "Called by the dream skill to replace Phases 1+2 (Orient + Gather Signal); outputs a structured markdown report"
    usage: "dream-scan --days 7  |  dream-scan --days 30 --home /path/to/home"

  - name: dream-verify
    allow: true
    description: "Verify dream memory file integrity across all projects"
    when_to_use: "Called by the dream skill to replace Phase 4 verification; checks line counts, broken refs, relative dates, duplicate names"
    usage: "dream-verify"

  - name: promote-scan
    allow: true
    description: "Scan memories and workbench artifacts for promotion evaluation"
    when_to_use: "Called by the promote skill to replace Phase 1 (Orient); outputs a structured markdown report of all memories and existing workbench artifacts"
    usage: "promote-scan  |  promote-scan --workbench /path/to/workbench"

  - name: retro-scan
    allow: true
    description: "Scan PR review comments and cross-reference against coding rules"
    when_to_use: "Called by the retro skill to replace Phase 1 (Orient); fetches PR comments from all registered repos and outputs a structured markdown report"
    usage: "retro-scan  |  retro-scan --home /path/to/home --workbench /path/to/workbench"
