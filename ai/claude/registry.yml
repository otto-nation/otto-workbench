# Claude script registry — installed when the Claude sub-tool is set up.
# Regenerate: generate-tool-context

meta:
  section: "Claude Scripts"
  install_check: false
  validation: bindir
  source: ai/claude/bin

tools:
  - name: claude-review
    description: "Run Claude's reviewer agent on a PR with local worktree checkout and iterative review support"
    when_to_use: "Running a structured code review on a PR; supports re-reviews that track resolved vs open findings. Use --self for self-review before PR creation. For multiple PRs, dispatch separate Agent subagents — do not background with &"
    usage: "claude-review <pr_url_or_number>  |  claude-review --no-post <pr_url_or_number>  |  claude-review --self [<pr_url_or_number>]"

  - name: claude-rules
    description: "Manages local Claude Code rule additions not tracked in the workbench"
    when_to_use: "Adding machine-specific or project-specific Claude instructions"
    usage: "claude-rules add <domain> \"rule\"  |  claude-rules list  |  claude-rules status"

  - name: review-orchestrate
    context: none
    description: "Review orchestration engine for claude-review — manages tier classification, file grouping, and review merging"
    when_to_use: "Called internally by claude-review; not invoked directly"

  - name: review-post
    context: none
    description: "Deterministic posting of review findings to GitHub as a PENDING PR review"
    when_to_use: "Called internally by claude-review post; not invoked directly"

  - name: validate-review-positions
    context: none
    description: "Validates review finding positions against a PR diff to ensure comment placement accuracy"
    when_to_use: "Called internally by claude-review; not invoked directly"
