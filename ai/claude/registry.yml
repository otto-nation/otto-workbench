# Claude script registry — installed when the Claude sub-tool is set up.
# Regenerate: generate-tool-context

meta:
  section: "AI Tooling"
  validation: bindir
  source: ai/claude/bin

tools:
  - name: claude-review
    permission: true
    visibility: full
    description: "Run Claude's reviewer agent on a PR with local worktree checkout and iterative review support"
    when_to_use: "Running a structured code review on a PR; supports re-reviews that track resolved vs open findings. Use --self for self-review before PR creation. For multiple PRs, dispatch separate Agent subagents — do not background with &"
    usage: "claude-review <pr_url_or_number>  |  claude-review --no-post <pr_url_or_number>  |  claude-review --self [<pr_url_or_number>]"

  - name: claude-rules
    permission: true
    visibility: brief
    description: "Manages local Claude Code rule additions not tracked in the workbench"

  - name: review-rebuild
    permission: false
    visibility: hidden
    description: "Rebuild review.md from group finding files — recovers from synthesis formatting drift"

  - name: review-threads
    permission: false
    visibility: hidden
    description: "Thread lifecycle status for PR review comments — dashboard and JSON report"

  - name: review-thread-triage
    permission: false
    visibility: hidden
    description: "Deprecated — redirects to review-threads --triage"

  - name: review-orchestrate
    permission: false
    visibility: hidden
    description: "Review orchestration engine for claude-review — manages tier classification, file grouping, and review merging"

  - name: review-post
    permission: false
    visibility: hidden
    description: "Deterministic posting of review findings to GitHub as a PENDING PR review"

  - name: validate-review-positions
    permission: false
    visibility: hidden
    description: "Validates review finding positions against a PR diff to ensure comment placement accuracy"

  - name: build-otto-ai-tools-tarball
    permission: false
    visibility: hidden
    description: "Package otto-ai-tools into a self-contained tarball for distribution"

  - name: dream-scan
    permission: true
    visibility: brief
    description: "Scan session transcripts and memory state for dream consolidation"

  - name: dream-verify
    permission: true
    visibility: brief
    description: "Verify dream memory file integrity across all projects"

  - name: promote-scan
    permission: true
    visibility: brief
    description: "Scan memories and workbench artifacts for promotion evaluation"

  - name: retro-scan
    permission: true
    visibility: brief
    description: "Scan PR review comments and cross-reference against coding rules"

  - name: pr
    permission: true
    visibility: full
    description: "Unified PR lifecycle CLI — CI failures, code review, and review comments"
    when_to_use: "Managing PR lifecycle: checking CI status, running reviews, addressing comments, or viewing unified PR status"
    usage: "pr status  |  pr ci [--fix]  |  pr review [--self] [--fix] [--post] [--repair] [--summary]  |  pr comments [--triage] [--fix] [--resolve]  |  pr fix  |  pr rebase [--fix] [--push] [--abort]  |  pr gc"

  - name: otto-log
    permission: true
    visibility: brief
    description: "Query trail files across otto-workbench AI scripts — structured audit trail of actions, decisions, and errors"

  - name: pr-rebase
    permission: false
    visibility: hidden
    description: "Rebase current branch onto origin/main with conflict detection and force-push"

  - name: ci-check
    permission: true
    visibility: hidden
    description: "Fetch CI run data, classify failures, and output status dashboard"

  - name: ceiling-scan
    permission: true
    visibility: brief
    description: "Scan for ceiling: markers and produce a structured debt ledger"

  - name: reuse-mode-tracker
    permission: false
    visibility: hidden
    description: "Track /reuse lite|full|ultra commands via UserPromptSubmit hook"

  - name: reuse-session-start
    permission: false
    visibility: hidden
    description: "SessionStart hook — inject reuse level and ceiling scan nudge"

  - name: reuse-subagent-start
    permission: false
    visibility: hidden
    description: "SubagentStart hook — inject reuse level into spawned subagents"

  - name: workbench-reference
    permission: true
    visibility: brief
    description: "Reference card — lists all workbench skills, agents, and reuse modes"

  - name: workbench-statusline
    permission: false
    visibility: hidden
    description: "Status line script — displays reuse level, ceiling debt count, and review status"

  - name: run-auto-task
    permission: false
    visibility: hidden
    description: "Run a Claude Code skill as a headless background session with output logging"
