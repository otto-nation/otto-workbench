# Headroom registry — token compression tool installed via pipx.
# Regenerate: generate-tool-context

meta:
  section: "AI Tooling"
  install_check: false
  validation: none

tools:
  - name: headroom
    permission: true
    visibility: full
    description: "Token compression for LLM tool outputs — wrap CLI sessions, run as proxy, or use as MCP server"
    when_to_use: "Reducing token usage in Claude Code sessions; compressing large tool outputs, logs, or file contents before they reach the LLM"
    usage: "headroom wrap claude  |  headroom proxy --port 8787  |  headroom mcp install  |  headroom update"
