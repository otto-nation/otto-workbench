# Bin script registry — globally installed scripts available from any directory.
# Regenerate: bin/local/generate-tool-context

meta:
  section: "Workbench Scripts"
  install_check: false
  validation: bindir
  source: bin

tools:
  - name: task
    allow: true
    context: always
    description: "AI-powered Git automation runner; wraps go-task with global/local Taskfile routing"
    when_to_use: "Running any dev workflow — commits, PRs, brew management"
    usage: "task commit  |  task pr:create  |  task --global <cmd>"
    docs: "https://taskfile.dev"

  - name: otto-workbench
    allow: true
    context: always
    description: "Manage your workbench developer environment"
    when_to_use: "After pulling workbench updates or when config gets out of sync"
    usage: "otto-workbench sync  |  otto-workbench ai init  |  otto-workbench ai sync  |  otto-workbench changelog"
    commands:
      - name: sync
        scope: "All components"
        when: "After pulling workbench updates or when config drifts"
        detail: "Re-applies all workbench config — runs pending migrations, re-symlinks scripts and configs, regenerates tool context, and syncs AI settings. Safe to re-run at any time."
      - name: discover
        scope: "Environment overview"
        when: "Checking what's installed, available scripts, and running agents"
        detail: "Shows installed components, available bin scripts (from registry), and launchd agent status."
      - name: "discover regenerate"
        scope: "Component state"
        when: "Re-detecting installed components after manual changes"
      - name: "ai init"
        scope: "Project"
        when: "Setting up Claude in a new project repo"
        detail: "Scaffolds a `.claude/` directory in the current git repo with stack-detected rules and a project anatomy file."
      - name: "ai init --force"
        scope: "Project"
        when: "Re-scaffolding an existing project's `.claude/`"
      - name: "ai sync"
        scope: "Machine"
        when: "Syncing just AI config without a full workbench sync"
        detail: "Syncs machine-level AI config (settings, rules, skills, agents, MCPs). AI-only subset of 'otto-workbench sync'."
      - name: "ai override"
        scope: "Machine"
        when: "Customizing AI agents, skills, or rules without editing tracked files"
        detail: "Manage user overrides — add, disable, enable, list, and show status of overrides for agents, skills, and rules."
      - name: changelog
        scope: "Git history"
        when: "Reviewing recent changes from conventional commits"

  - name: mem-analyze
    allow: true
    context: reference
    description: "macOS memory analysis report — pressure, swap usage, top processes, per-user totals"
    when_to_use: "Diagnosing memory issues, high swap, or identifying memory-hungry processes"
    usage: "mem-analyze"

  - name: wt-cleanup
    allow: true
    context: reference
    description: "Remove stale git worktrees — merged branches and optionally age-based cleanup"
    when_to_use: "Cleaning up accumulated worktrees; runs automatically on Claude session stop"
    usage: "wt-cleanup  |  wt-cleanup --age 7  |  wt-cleanup --dry-run"

  - name: resolve-branch
    allow: true
    context: reference
    description: "Resolve a fuzzy branch name to an exact git branch — tries exact, worktree, separator, fuzzy"
    when_to_use: "When a branch name might use dashes instead of slashes, or might be a worktree directory name"
    usage: "resolve-branch <input>"

  - name: wt-init
    allow: true
    context: always
    description: "Convert a regular git repo to a bare repo with worktrees"
    when_to_use: "Setting up a repo for parallel worktree development with worktrunk"
    usage: "wt-init  |  wt-init ~/code/myrepo  |  wt-init --dry-run"

  - name: lint-sweep
    allow: true
    context: always
    description: "Sweep lint violations across multiple Go repos — detect, report, and optionally create fix branches"
    when_to_use: "Remediating a lint rule across many repos at once (e.g. no-stdlib-log, no-raw-getenv)"
    usage: "lint-sweep --rule no-stdlib-log --repos 'svc-*'  |  lint-sweep --rule no-raw-getenv --repos ~/src/maximum/main/svc-* --fix  |  lint-sweep --rule <name> --repos . --dry-run"

  - name: validate-nesting
    allow: true
    context: always
    description: "Validate bash, Python, and Go script nesting depth to enforce flat control flow"
    when_to_use: "After writing deeply nested conditionals or loops; runs automatically on pre-push for all repos"
    usage: "validate-nesting [--quiet] [--max-depth N] [file...]"

  - name: gcloud-reauth
    allow: false
    context: reference
    description: "Check GCP application-default credentials and re-login if expired, with self-managed launchd agent"
    when_to_use: "Before running commands that need GCP credentials, or when auth errors appear"
    usage: "gcloud-reauth  |  gcloud-reauth install  |  gcloud-reauth status  |  gcloud-reauth uninstall"

  - name: get-secret
    allow: false
    context: reference
    description: "Interactively retrieves a secret from AWS Secrets Manager by listing and selecting"
    when_to_use: "Fetching credentials or config values stored in Secrets Manager"
    usage: "get-secret"
