# AWS stack registry.
# Install: brew bundle --file=brew/infra/aws.Brewfile
# Regenerate: generate-tool-context

meta:
  section: "AWS Tools"
  scope: infra
  install_check: false
  install_check_command: aws
  validation: brewfile
  source: brew/infra/aws.Brewfile

tools:
  - name: aws
    permission: false
    visibility: brief
    brew_name: awscli
    description: "AWS CLI — manage AWS resources, services, and credentials from the terminal"
    docs: "https://docs.aws.amazon.com/cli/"

  - name: aws-sso-util
    permission: false
    visibility: brief
    description: "Utilities for AWS SSO — simplifies login and credential management for SSO-based AWS accounts"
    docs: "https://github.com/benkehoe/aws-sso-util"
