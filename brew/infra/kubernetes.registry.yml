# Kubernetes stack registry.
# Install: brew bundle --file=brew/infra/kubernetes.Brewfile
# Regenerate: generate-tool-context

meta:
  section: "Kubernetes Tools"
  scope: infra
  install_check: false
  validation: brewfile
  source: brew/infra/kubernetes.Brewfile

tools:
  - name: k9s
    permission: false
    visibility: brief
    description: "Terminal UI for Kubernetes — real-time cluster monitoring and management"
    docs: "https://k9scli.io/"

  - name: kubectx
    permission: false
    visibility: brief
    description: "Fast Kubernetes context and namespace switcher"
    docs: "https://github.com/ahmetb/kubectx"

  - name: kubectl
    permission: true
    visibility: brief
    brew_name: kubernetes-cli
    description: "Kubernetes CLI — manage clusters, deployments, pods, and services"
    docs: "https://kubernetes.io/docs/reference/kubectl/"
