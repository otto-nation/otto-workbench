# Terraform stack registry.
# Install: brew bundle --file=brew/infra/terraform.Brewfile
# Regenerate: generate-tool-context

meta:
  section: "Terraform Tools"
  scope: infra
  install_check: false
  validation: brewfile
  source: brew/infra/terraform.Brewfile

tools:
  - name: tfenv
    permission: false
    visibility: brief
    description: "Terraform version manager — install and switch between Terraform versions"
    docs: "https://github.com/tfutils/tfenv"

  - name: terraform-docs
    permission: false
    visibility: brief
    description: "Generate documentation from Terraform module inputs and outputs"
    docs: "https://terraform-docs.io/"
