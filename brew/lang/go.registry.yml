# Go stack registry.
# Install: brew bundle --file=brew/lang/go.Brewfile
# Regenerate: generate-tool-context

meta:
  section: "Go Tools"
  scope: go
  install_check: false
  validation: brewfile
  source: brew/lang/go.Brewfile

tools:
  - name: go
    permission: true
    visibility: brief
    description: "Go programming language toolchain — compiler, formatter, and standard tooling"
    docs: "https://go.dev/doc/"

  - name: golangci-lint
    permission: true
    visibility: brief
    description: "Fast Go linter runner — aggregates and runs many linters in one pass"
    docs: "https://golangci-lint.run/"

  - name: goreleaser
    permission: true
    visibility: brief
    description: "Go release automation — builds cross-platform binaries and publishes GitHub releases"
    docs: "https://goreleaser.com/"
