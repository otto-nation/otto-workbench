# Go stack registry — AI context for Claude/Kiro.
# Install: brew bundle --file=brew/lang/go.Brewfile
# Regenerate: bin/generate-tool-context

meta:
  section: "Go Tools"
  install_check: true
  validation: brewfile
  source: brew/lang/go.Brewfile

tools:
  - name: go
    description: "Go programming language toolchain — compiler, formatter, and standard tooling"
    when_to_use: "Building, running, or testing Go projects"
    usage: "go build ./...  |  go test ./...  |  go run main.go  |  go fmt ./..."
    docs: "https://go.dev/doc/"

  - name: golangci-lint
    description: "Fast Go linter runner — aggregates and runs many linters in one pass"
    when_to_use: "Linting Go code before committing; enforcing code quality in CI"
    usage: "golangci-lint run  |  golangci-lint run ./...  |  golangci-lint run --fix"
    docs: "https://golangci-lint.run/"

  - name: goreleaser
    description: "Go release automation — builds cross-platform binaries and publishes GitHub releases"
    when_to_use: "Publishing a Go project as a versioned release with binaries, changelogs, and Homebrew tap"
    usage: "goreleaser release --clean  |  goreleaser build --snapshot"
    docs: "https://goreleaser.com/"
