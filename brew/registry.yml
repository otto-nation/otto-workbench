# Brew tool registry.
# Add an entry here whenever you add a formula or cask to the Brewfile.
# Regenerate: generate-tool-context

meta:
  section: "Brew Tools"
  install_check: false
  validation: brewfile
  source: brew/Brewfile

tools:
  - name: docker
    visibility: full
    permission:
      - "Bash(docker build:*)"
      - "Bash(docker compose:*)"
      - "Bash(docker cp:*)"
      - "Bash(docker images:*)"
      - "Bash(docker inspect:*)"
      - "Bash(docker logs:*)"
      - "Bash(docker network:*)"
      - "Bash(docker ps:*)"
      - "Bash(docker pull:*)"
      - "Bash(docker rm:*)"
      - "Bash(docker run:*)"
      - "Bash(docker stop:*)"
      - "Bash(docker tag:*)"
      - "Bash(docker version:*)"
      - "Bash(docker volume:*)"
    description: "Docker CLI — build, run, and manage containers against any backend runtime"
    when_to_use: "Running container commands; works with Colima, OrbStack, or any Docker-compatible runtime"
    usage: "docker run  |  docker build  |  docker compose up  |  docker ps"
    docs: "https://docs.docker.com/engine/reference/commandline/cli/"

  - name: jq
    permission: true
    visibility: full
    description: "JSON processor for querying, filtering, and transforming JSON data"
    when_to_use: "Parsing API responses, extracting fields from JSON output, transforming JSON config"
    usage: "jq '.field' file.json  |  echo '{}' | jq '.key'"
    docs: "https://jqlang.github.io/jq/manual/"

  - name: yq
    permission: true
    visibility: full
    description: "YAML/JSON/TOML processor — like jq but for YAML"
    when_to_use: "Reading or modifying YAML files (Taskfile.yml, docker-compose.yml, k8s manifests)"
    usage: "yq '.key' file.yaml  |  yq -i '.key = \"value\"' file.yaml"
    docs: "https://mikefarah.gitbook.io/yq/"

  - name: gh
    visibility: full
    permission:
      - "Bash(gh pr:*)"
      - "Bash(gh issue:*)"
      - "Bash(gh run:*)"
      - "Bash(gh workflow:*)"
      - "Bash(gh release:*)"
      - "Bash(gh search:*)"
      - "Bash(gh repo view:*)"
      - "Bash(gh repo list:*)"
      - "Bash(gh repo clone:*)"
      - "Bash(gh repo fork:*)"
      - "Bash(gh repo sync:*)"
      - "Bash(gh auth status:*)"
      - "Bash(gh gist:*)"
      - "Bash(gh label:*)"
      - "Bash(gh milestone:*)"
      - "Bash(gh api:*)" # broad — needed for review workflows and scripted API calls
    description: "GitHub CLI — manage PRs, issues, repos, checks, and releases from the terminal"
    when_to_use: "Creating/viewing PRs, checking CI status, managing issues, cloning repos, viewing runs"
    usage: "gh pr create  |  gh pr view  |  gh run list  |  gh issue create"
    docs: "https://cli.github.com/manual/"

  - name: go-task
    permission: false
    visibility: hidden
    description: "Task runner with YAML-defined tasks (used via the 'task' wrapper script)"
    docs: "https://taskfile.dev"

  - name: shellcheck
    permission: true
    visibility: full
    description: "Static analysis tool for shell scripts — catches bugs and style issues"
    when_to_use: "Before committing any .sh file; run automatically in pre-push and CI"
    usage: "shellcheck script.sh"
    docs: "https://www.shellcheck.net/"

  - name: bats-core
    permission: "bats"
    visibility: full
    description: "Bash Automated Testing System — unit testing framework for shell scripts"
    when_to_use: "Writing or running tests for bash scripts in this repo"
    usage: "bats tests/  |  bats tests/foo.bats"
    docs: "https://bats-core.readthedocs.io/"

  - name: parallel
    permission: false
    visibility: hidden
    description: "GNU parallel — run shell commands in parallel across multiple cores"
    brew_name: "parallel"
    docs: "https://www.gnu.org/software/parallel/"

  - name: tree
    permission: true
    visibility: brief
    description: "Recursive directory listing tool — visualizes folder structure as a tree"
    docs: "https://oldmanprogrammer.net/source.php?dir=projects/tree"

  - name: delta
    permission: false
    visibility: hidden
    description: "Syntax-highlighting pager for git diffs — word-level diff highlighting with line numbers"
    docs: "https://dandavison.github.io/delta/"

  - name: pipx
    permission: true
    visibility: hidden
    description: "Install and run Python CLI tools in isolated environments"
    docs: "https://pipx.pypa.io/"

  - name: uv
    permission: false
    visibility: hidden
    description: "Fast Python package and project manager (Rust-based pip/venv replacement)"
    docs: "https://docs.astral.sh/uv/"

  - name: worktrunk
    permission: "wt"
    visibility: full
    description: "Git worktree manager — create, switch, list, merge, and remove worktrees with hooks and CI integration"
    when_to_use: "Managing parallel git worktrees for concurrent feature development or isolating Claude Code agents in separate worktrees"
    usage: "wt switch -c feat/auth  |  wt list  |  wt merge  |  wt remove feat/auth"
    docs: "https://worktrunk.dev"

  - name: gitleaks
    permission: false
    visibility: brief
    description: "Secret scanner — detects committed credentials, tokens, and keys"
    docs: "https://github.com/gitleaks/gitleaks"
