# Shell stack registry.
# Install: brew bundle --file=brew/shell/shell.Brewfile
# Regenerate: generate-tool-context

meta:
  section: "Shell Tools"
  install_check: true
  validation: brewfile
  source: brew/shell/shell.Brewfile

tools:
  - name: starship
    permission: false
    visibility: hidden
    description: "Fast, cross-shell prompt — shows git status, language versions, and context at a glance"
    docs: "https://starship.rs"

  - name: fzf
    permission: false
    visibility: hidden
    description: "Fuzzy finder — interactive search for files, history, and command output"
    docs: "https://github.com/junegunn/fzf"

  - name: zoxide
    permission: false
    visibility: hidden
    description: "Smarter cd — learns frequently-visited directories and jumps to them by partial name"
    docs: "https://github.com/ajeetdsouza/zoxide"

  - name: zsh-history-substring-search
    permission: false
    visibility: hidden
    description: "History search filtered by what you've typed — press up/down to cycle through matches"
    docs: "https://github.com/zsh-users/zsh-history-substring-search"

  - name: zsh-completions
    permission: false
    visibility: hidden
    description: "Additional completion definitions for zsh — extends tab-completion for many tools"
    docs: "https://github.com/zsh-users/zsh-completions"

  - name: zsh-syntax-highlighting
    permission: false
    visibility: hidden
    description: "Fish-style syntax highlighting for zsh — highlights valid commands green, errors red"
    docs: "https://github.com/zsh-users/zsh-syntax-highlighting"
