# Tools stack registry.
# Install: brew bundle --file=brew/tools/tools.Brewfile
# Regenerate: generate-tool-context

meta:
  section: "Dev Tools"
  install_check: true
  validation: brewfile
  source: brew/tools/tools.Brewfile

tools:
  - name: jira
    brew_name: "ankitpokhrel/jira-cli/jira-cli"
    description: "Jira CLI (ankitpokhrel/jira-cli) — manage Jira tickets from the terminal"
    when_to_use: "Viewing, moving, or commenting on Jira tickets; checking ticket status; assigning issues"
    usage: "jira issue view PROJ-123 --plain  |  jira issue list -P PROJ --plain  |  jira issue move PROJ-123 \"In Progress\""
    docs: "https://github.com/ankitpokhrel/jira-cli"

  - name: linear
    brew_name: "schpet/tap/linear"
    description: "Linear CLI (schpet/linear-cli) — manage Linear issues from the terminal"
    when_to_use: "Listing, creating, or starting Linear issues; git-aware issue tracking"
    usage: "linear issue list  |  linear issue start <ID>  |  linear issue create  |  linear auth login"
    docs: "https://github.com/schpet/linear-cli"

  - name: mas
    description: "Mac App Store CLI — search, install, and update App Store apps from the terminal"
    when_to_use: "Installing or updating App Store apps; scripting machine setup with App Store installs"
    usage: "mas search <app>  |  mas install <id>  |  mas upgrade"
    docs: "https://github.com/mas-cli/mas"
