# AWS environment variables — consumed by zsh/config.d/aliases/aws.zsh.
# Regenerate: ai/bin/generate-tool-context

meta:
  section: "AWS Environment"
  install_check: true
  install_check_command: aws
  validation: none

env:
  - var: AWS_PROFILE
    comment: "Default AWS CLI profile"
  - var: AWS_DEFAULT_REGION
    comment: "Default AWS region"
    default: "us-east-1"
  - var: AWS_REGION
    comment: "AWS region for aliases (aws-whoami, aws-docker)"
    default: "us-east-1"
  - var: AWS_ACCOUNT_ID
    comment: "AWS account ID for ECR login (aws-docker alias)"

tools: []
