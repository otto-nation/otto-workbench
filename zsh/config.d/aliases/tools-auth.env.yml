# Authentication tokens for CLI tools consumed by the interactive shell.
# Regenerate: generate-tool-context

meta:
  section: "Tool Authentication"
  install_check: false
  validation: none

tools:
  - name: jira
    permission: false
    visibility: hidden
    description: "Jira CLI authentication"
    auth:
      env_var: JIRA_API_TOKEN
      setup_url: "https://id.atlassian.net/manage-profile/security/api-tokens"
  - name: linear
    permission: false
    visibility: hidden
    description: "Linear CLI authentication"
    auth:
      env_var: LINEAR_API_KEY
      prefix: "lin_api_"
      setup_url: "https://linear.app/settings/api"
