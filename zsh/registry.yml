# Zsh alias registry.
# Add an entry here whenever you add a new alias group to zsh/config.d/.
# Regenerate: generate-tool-context

meta:
  section: "Shell Aliases"
  install_check: false
  validation: zsh-comments
  source: zsh

tools:
  - name: "Git aliases"
    permission: false
    visibility: hidden
    description: "Short forms for common git operations (gs, ga, gc, gp, gl, gco, gb, gd)"

  - name: "Docker aliases"
    permission: false
    visibility: hidden
    description: "Short forms for docker and docker compose operations (d, dc, d-ps, d-logs, d-exec, d-clean)"

  - name: "Kubernetes aliases"
    permission: false
    visibility: hidden
    description: "Short forms for kubectl operations (k, k-pods, k-svc, k-deploy, k-logs, k-exec, k-ns)"

  - name: "Development aliases"
    permission: false
    visibility: hidden
    description: "Shortcuts for Gradle, Node, and Serena (gw, gw-build, gw-test, nom, serena)"

  - name: "System aliases"
    permission: false
    visibility: hidden
    description: "macOS and shell utilities (update, reload, list-ports, ip, flush-dns, afk)"
